<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background: #007bff;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .response {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
            display: none;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <h1>Upload your Work</h1>
    
    <form id="alt-form">
        <div class="form-group">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
        </div>
        
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
        </div>
        
        <div class="form-group">
            <label for="abstract">Abstract:</label>
            <textarea id="abstract" name="abstract" rows="4"></textarea>
        </div>
        
        <div class="form-group">
            <label for="article_file">Upload .docx file:</label>
            <input type="file" id="article_file" accept=".docx">
        </div>
        
        <button type="submit" id="submit-btn">Submit</button>
    </form>
    
    <div id="response" class="response"></div>

    <script>
        // REPLACE WITH YOUR ACTUAL SCRIPT URL
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzmV09jXnlII5n0nDx4HunRVAerL76cB5C724yr2VMXxWEmrzih_OCZIy2Lrqqep0j4/exec';
        
        const form = document.getElementById('alt-form');
        const submitBtn = document.getElementById('submit-btn');
        const response = document.getElementById('response');
        const fileInput = document.getElementById('article_file');
        
        // Convert file to base64
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => {
                    // Remove the data:application/...;base64, prefix
                    const base64 = reader.result.split(',')[1];
                    resolve(base64);
                };
                reader.onerror = error => reject(error);
            });
        }
        
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Processing...';
            response.style.display = 'none';
            
            try {
                // Prepare form data
                const formData = new FormData();
                formData.append('name', document.getElementById('name').value);
                formData.append('email', document.getElementById('email').value);
                formData.append('abstract', document.getElementById('abstract').value);
                
                // Handle file upload
                const file = fileInput.files[0];
                if (file) {
                    console.log('Converting file to base64...');
                    const base64Data = await fileToBase64(file);
                    formData.append('file_data', base64Data);
                    formData.append('file_name', file.name);
                    formData.append('file_type', file.type);
                    console.log('File converted, size:', base64Data.length);
                }
                
                console.log('Sending request...');
                const fetchResponse = await fetch(scriptURL, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await fetchResponse.json();
                console.log('Response:', data);
                
                if (data.result === 'success') {
                    response.textContent = 'Success! File uploaded to Drive.';
                    response.className = 'response success';
                    form.reset();
                } else {
                    response.textContent = 'Error: ' + (data.error || 'Unknown error');
                    response.className = 'response error';
                }
                
            } catch (error) {
                console.error('Error:', error);
                response.textContent = 'Error: ' + error.message;
                response.className = 'response error';
            }
            
            response.style.display = 'block';
            submitBtn.disabled = false;
            submitBtn.textContent = 'Submit';
        });
    </script>
</body>
</html>
